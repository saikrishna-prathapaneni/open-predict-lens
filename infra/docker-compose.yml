services:
  backend:
    build:
      context: ../backend
    env_file:
      - ./env/backend.env
    ports:
      - "9000:9000"
    volumes:
      - ../backend/src:/app/src
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build:
      context: ../frontend
    env_file:
      - ./env/frontend.env
    ports:
      - "3000:3000"
    volumes:
      # Mount source so the dev server picks up local file changes
      - ../frontend/src:/app/src
      - ../frontend/public:/app/public
      # Preserve node_modules installed during image build — prevents the
      # src mount from shadowing them with the (empty) host directory
      - frontend_node_modules:/app/node_modules
    environment:
      # macOS Docker runs inside a Linux VM; filesystem events don't propagate.
      # These flags force polling so Next.js hot-reload works correctly.
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    env_file:
      - ./env/db.env
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db-data:
  frontend_node_modules:
